<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>A Gift For You</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="page-intro">

    <!-- Background canvas for animated stars -->
    <canvas id="bg-canvas"></canvas>

    <main class="intro-container">

      
      <p class="intro-eyebrow">heyy, happy birthday.</p>


      <h1 class="intro-title">A Constellation Worth Finding.</h1>

 
      <p class="intro-subtitle">
        Every star holds a memory. Every constellation tells a story.<br />
        This one is yours.
      </p>


      <a href="./stars.html" class="intro-btn">
        <span class="btn-text">Look Up</span>
        <span class="btn-sparkle">✦</span>
      </a>

    </main>

    <!-- Decorative floating particles -->
    <div class="intro-particles" id="intro-particles"></div>

    
    <audio id="bg-music" loop preload="auto">
      <source src="./audio/ambient.mpeg" type="audio/mpeg" />
    </audio>

    <!-- Music toggle button (bottom-right corner) -->
    <button class="music-toggle" id="music-toggle" aria-label="Toggle music" title="Play / Pause music">
      <span class="music-icon-play">♪</span>
      <span class="music-icon-pause">⏸</span>
    </button>

    <script src="./script.js"></script>
  </body>
</html>
