<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <title>Our Constellation</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="page-stars">

    <!-- The sky canvas (draws background stars  constellation lines) -->
    <canvas id="sky-canvas"></canvas>

    <div class="scroll-hint" id="scroll-hint">
      <span class="scroll-hint-icon">↓</span>
      <span>Scroll to explore the sky &nbsp;·&nbsp; Click a star to remember</span>
    </div>

    <div class="star-field" id="star-field">
      <!-- Stars are injected here by script.js -->
    </div>

    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal-card" id="modal-card">
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
        <div class="modal-star-name" id="modal-star-name"></div>
        <div class="modal-body">
          <h2 class="modal-title" id="modal-title"></h2>
          <p class="modal-text" id="modal-text"></p>
          <div class="modal-image-wrap" id="modal-image-wrap">
            <img class="modal-image" id="modal-image" src="" alt="" />
          </div>
        </div>
      </div>
    </div>

    <audio id="bg-music" loop preload="auto style="display:none;">
      <source src="ambient.mp3" type="audio/mpeg" />
    </audio>

    <!-- Music toggle button -->
    <button class="music-toggle" id="music-toggle" aria-label="Toggle music" title="Play / Pause music">
      <span class="music-icon-play">♪</span>
      <span class="music-icon-pause">⏸</span>
    </button>

    <script src="./script.js"></script>
  </body>
</html>
